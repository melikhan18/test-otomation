name: qa-platform

# Full-stack compose: infrastructure + all backend services.
#
# Configuration comes from `.env` (gitignored). See `.env.example` for the
# schema. All sensitive values fall back to insecure dev defaults so that
# `docker compose up` keeps working on a fresh checkout — but those defaults
# are NOT safe for production. Always provide a real `.env` in deployments.
#
# Port bindings honour the *_BIND env vars: in dev they default to `0.0.0.0`
# (so host tools can reach DB/MinIO directly); in prod set them to `127.0.0.1`
# so only the host (and the nginx reverse proxy on it) can connect.
#
# Backend layout (F1+):
#   - Shared kernel:        shared/{api-gateway,auth-service,common}
#   - Android platform:     products/android/backend/{automation,device,session,device-bridge}-service
# The root Dockerfile takes two build args:
#   SERVICE       — Gradle module short name (also used for the bootJar task)
#   SERVICE_PATH  — filesystem path of the module's projectDir, so the COPY
#                   in the runtime stage can grab the right build/libs/*.jar.

x-service-env: &service-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ${POSTGRES_DB:-qa_platform}
  DB_USER: ${POSTGRES_USER:-dp}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-dp_dev_password}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  # JWT signing secret. Override in `.env` for production. Must be base64 of
  # at least 64 raw bytes. The fallback below is INSECURE — anyone who reads
  # this file can forge tokens. Generate a real one with:
  #   openssl rand -base64 64 | tr -d '\n'
  JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtMTIzNDU2Nzg=}
  # Object storage (MinIO). The endpoint is the in-network address services use
  # to PUT/GET objects; the public URL is what the browser actually opens.
  MINIO_ENDPOINT:   http://minio:9000
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-qa_platform}
      POSTGRES_USER:     ${POSTGRES_USER:-dp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dp_dev_password}
    ports:
      - "${POSTGRES_BIND:-0.0.0.0}:5432:5432"
    volumes:
      - qp_pgdata:/var/lib/postgresql/data
      - ./deploy/sql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dp} -d ${POSTGRES_DB:-qa_platform}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "${REDIS_BIND:-0.0.0.0}:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_BIND:-0.0.0.0}:9000:9000"   # S3 API
      - "${MINIO_BIND:-0.0.0.0}:9001:9001"   # Web console
    volumes:
      - qp_miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot init: creates the buckets we need with anonymous-download policy so
  # the web console can render screenshots / video without S3 presigning gymnastics.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb -p local/screenshots &&
      mc mb -p local/videos &&
      mc mb -p local/apks &&
      mc anonymous set download local/screenshots &&
      mc anonymous set download local/videos &&
      mc anonymous set download local/apks &&
      echo 'minio buckets ready'
      "
    restart: "no"

  # ── Shared kernel ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
        SERVICE_PATH: shared/auth-service
    environment:
      <<: *service-env
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "${AUTH_BIND:-0.0.0.0}:8081:8081"
    restart: unless-stopped
    # Probes the actuator endpoint — only OK after Flyway finishes & Tomcat is
    # bound, which guarantees the tenancy tables (V3) exist before downstream
    # services try to backfill cross-schema in V2/V10.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  tenant-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: tenant-service
        SERVICE_PATH: shared/tenant-service
    environment:
      <<: *service-env
    depends_on:
      postgres:     { condition: service_healthy }
      # tenant.V1 backfills from auth.projects — wait for auth-service to finish
      # its V3 tenancy migration.
      auth-service: { condition: service_healthy }
    ports:
      - "${TENANT_BIND:-0.0.0.0}:8089:8089"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8089/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  reports-aggregator-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: reports-aggregator-service
        SERVICE_PATH: shared/reports-aggregator-service
    environment:
      <<: *service-env
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "${REPORTS_BIND:-0.0.0.0}:8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
        SERVICE_PATH: shared/api-gateway
    environment:
      <<: *service-env
      SVC_AUTH:        http://auth-service:8081
      SVC_TENANT:      http://tenant-service:8089
      SVC_REPORTS:     http://reports-aggregator-service:8090
      SVC_DEVICE:      http://android-device-service:8082
      SVC_SESSION:     http://android-session-service:8083
      SVC_BRIDGE:      http://android-bridge-service:8084
      SVC_BRIDGE_WS:   ws://android-bridge-service:8084
      SVC_AUTOMATION:  http://android-automation-service:8085
      SVC_WEB_RUNNER:  http://web-runner-service:8088
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
    depends_on:
      - auth-service
      - tenant-service
      - reports-aggregator-service
      - android-device-service
      - android-session-service
      - android-bridge-service
      - android-automation-service
      - web-runner-service
    ports:
      - "${GATEWAY_BIND:-0.0.0.0}:8080:8080"
    restart: unless-stopped

  # ── Android platform stack ────────────────────────────────────────────────────
  android-device-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: android-device-service
        SERVICE_PATH: products/android/backend/device-service
    environment:
      <<: *service-env
      # Spring relaxed-binding: APP_BRIDGE_PUBLIC_WS_URL → app.bridge.public-ws-url
      APP_BRIDGE_PUBLIC_WS_URL: ${APP_BRIDGE_PUBLIC_WS_URL:-ws://localhost:8080/ws/agent}
    depends_on:
      postgres:     { condition: service_healthy }
      redis:        { condition: service_healthy }
      # device.V2 reads auth.companies for backfill — wait for V3 to finish.
      auth-service: { condition: service_healthy }
    ports:
      - "${DEVICE_BIND:-0.0.0.0}:8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  android-session-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: android-session-service
        SERVICE_PATH: products/android/backend/session-service
    environment:
      <<: *service-env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "${SESSION_BIND:-0.0.0.0}:8083:8083"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  android-bridge-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: android-bridge-service
        SERVICE_PATH: products/android/backend/device-bridge-service
    environment:
      <<: *service-env
    depends_on:
      redis: { condition: service_healthy }
    ports:
      - "${BRIDGE_BIND:-0.0.0.0}:8084:8084"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ── Web platform stack (v1) — Playwright server-side runner ─────────────────
  # Bigger image (~1.8 GB) because the Microsoft Playwright base ships with
  # Chromium + Firefox + WebKit binaries plus system deps. Bound to 4GB memory
  # + 2 CPUs by default; raise if you push >4 concurrent runs.
  # NOTE: uses its own Dockerfile (not the shared root one) because of the
  # custom base image and Node runtime requirement.
  web-runner-service:
    build:
      context: .
      dockerfile: products/web/backend/runner-service/Dockerfile
      args:
        SERVICE_PATH: products/web/backend/runner-service
    environment:
      <<: *service-env
      SVC_REPORTS: http://reports-aggregator-service:8090
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
    ports:
      - "${WEB_RUNNER_BIND:-0.0.0.0}:8088:8088"
    # Chromium's renderer crashes silently if /dev/shm < 64MB. Default Docker
    # value is 64 MB; bump to 1 GB to be safe for parallel runs.
    shm_size: 1gb
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      # Playwright first-launch can take 60-90s while Spring + Playwright + Node
      # bootstrap, so the probe needs a generous start period.
      start_period: 90s

  android-automation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: android-automation-service
        SERVICE_PATH: products/android/backend/automation-service
    environment:
      <<: *service-env
      SVC_SESSION: http://android-session-service:8083
      SVC_BRIDGE:  http://android-bridge-service:8084
      SVC_REPORTS: http://reports-aggregator-service:8090
      RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
      RETENTION_DAYS:    ${RETENTION_DAYS:-30}
      RETENTION_CRON:    ${RETENTION_CRON:-0 0 3 * * *}
    depends_on:
      postgres: { condition: service_healthy }
      # automation.V10 reads auth.companies/projects for backfill — wait for V3.
      auth-service:          { condition: service_healthy }
      android-session-service:       { condition: service_started }
      android-bridge-service: { condition: service_started }
      minio:                 { condition: service_healthy }
    ports:
      - "${AUTOMATION_BIND:-0.0.0.0}:8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ── Web console + reverse proxy (production only) ───────────────────────────
  # Single Caddy container does two jobs:
  #   1) Serves the static React bundle (built into /srv inside the image).
  #   2) Reverse-proxies /api → api-gateway, /ws → api-gateway, /minio → minio.
  # Caddy issues + auto-renews Let's Encrypt certs for $DOMAIN and www.$DOMAIN.
  # Certificates persist in qp_caddydata so restarts don't re-issue and trip
  # the ACME rate limit.
  #
  # Activate with:   docker compose --profile prod up -d --build
  web-console:
    build:
      context: ./frontend/web-console
    environment:
      DOMAIN:      ${DOMAIN:-maieras.com}
      ACME_EMAIL:  ${ACME_EMAIL:-admin@${DOMAIN:-maieras.com}}
    depends_on:
      - api-gateway
      - minio
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC) — Caddy advertises it via Alt-Svc
    volumes:
      - qp_caddydata:/data         # certificates + ACME account state
      - qp_caddyconfig:/config     # runtime config snapshot
    restart: unless-stopped
    profiles: ["prod"]

  # ── Observability stack ──────────────────────────────────────────────
  # Loki (log storage) + Promtail (log shipper) + Grafana (UI). All three
  # ship as official images and run together in ~700 MB RAM total. Promtail
  # tails every container's stdout/stderr via the Docker socket so no
  # application code change is needed — the structured JSON each service
  # emits (see :common/.../logback-spring.xml) lands in Loki ready to query.
  #
  # In Grafana: `{compose_service="web-runner-service"} | json | runId="N"`
  # filters logs for one specific run thanks to the MDC field we set in
  # the orchestrators.

  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - qp_loki:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  promtail:
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infra/loki/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - qp_promtail:/var/lib/promtail
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"   # 3000 is taken by vite dev server, expose on 3001
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_LOG_LEVEL:               "warn"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - qp_grafana:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qp_pgdata:
  qp_miniodata:
  qp_caddydata:
  qp_caddyconfig:
  qp_loki:
  qp_promtail:
  qp_grafana:

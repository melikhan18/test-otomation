# Single-binary Loki config tuned for a solo-dev / small-team setup.
# Everything (ingester, querier, store) runs in one process; persistence
# is the local filesystem inside the container, mounted to the qp_loki
# volume. For an HA cluster we'd move to S3 + memberlist, but this is
# overkill for the QA Platform's log volume.

auth_enabled: false   # single-tenant; gateway is the only auth boundary

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention: 30 days. Plenty for solo-dev incident review, keeps disk
# usage bounded (~1-3 GB/month for this workload). Adjust as needed.
limits_config:
  retention_period: 720h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Disable analytics phone-home; we're running self-hosted on purpose.
analytics:
  reporting_enabled: false

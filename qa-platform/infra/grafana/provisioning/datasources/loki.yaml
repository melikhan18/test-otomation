# Auto-wire Loki as Grafana's default data source on first boot.
# Grafana picks this up via the provisioning mount in docker-compose.

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      # Derived fields turn `runId="N"` matches into a clickable filter
      # link inside the log explorer.
      derivedFields:
        - name: runId
          matcherRegex: '"runId":"(\d+)"'
          url: '/explore?left={"queries":[{"refId":"A","expr":"{compose_service=\"web-runner-service\"} | json | runId=\"$${__value.raw}\""}]}'
          urlDisplayLabel: 'View all logs for run'

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device Platform</title>
    <!--
      Theme bootstrap — runs *before* the React bundle parses, so the page paints
      in the right theme on the very first frame. Without this, F5 flashes the
      default theme (dark) for ~50–200 ms while React/ThemeProvider mounts.

      Reads the same localStorage key as the Zustand store (`device-platform-theme`)
      and falls back to the OS via prefers-color-scheme when unset or mode=system.
      Wrapped in a try/catch so a hostile storage env (privacy mode, quota) can't
      crash the boot.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("device-platform-theme");
          var mode = "system";
          if (raw) {
            // Zustand persist wraps state in { state: {...}, version: n }.
            var parsed = JSON.parse(raw);
            mode = (parsed && parsed.state && parsed.state.mode) || "system";
          }
          var resolved = mode;
          if (mode === "system") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          if (resolved === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (_) {
          // On error fall back to system preference, never crash.
          if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.classList.add("dark");
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

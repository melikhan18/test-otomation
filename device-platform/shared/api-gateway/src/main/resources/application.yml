server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpserver:
        wiretap: false
      httpclient:
        websocket:
          # Default is 64 KB which truncates H.264 keyframes. Match the bridge ceiling.
          max-frame-payload-length: 10485760
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        - id: auth
          uri: ${SVC_AUTH:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        # Tenancy management endpoints live in auth-service.
        - id: companies
          uri: ${SVC_AUTH:http://localhost:8081}
          predicates:
            - Path=/api/companies/**
        - id: notifications
          uri: ${SVC_AUTH:http://localhost:8081}
          predicates:
            - Path=/api/notifications/**
        - id: admin-users
          uri: ${SVC_AUTH:http://localhost:8081}
          predicates:
            - Path=/api/admin/**
        - id: devices
          uri: ${SVC_DEVICE:http://localhost:8082}
          predicates:
            - Path=/api/devices/**,/api/agent/**
        - id: sessions
          uri: ${SVC_SESSION:http://localhost:8083}
          predicates:
            - Path=/api/sessions/**
        - id: bridge-ws
          uri: ${SVC_BRIDGE_WS:ws://localhost:8084}
          predicates:
            - Path=/ws/**
        - id: bridge-http
          uri: ${SVC_BRIDGE:http://localhost:8084}
          predicates:
            - Path=/api/bridge/**
        - id: automation
          uri: ${SVC_AUTOMATION:http://localhost:8085}
          predicates:
            - Path=/api/automation/**
      globalcors:
        cors-configurations:
          '[/**]':
            # Comma-separated list of allowed origin patterns. Override via
            # `CORS_ALLOWED_ORIGINS` env var in production — set to your exact
            # console domain(s), e.g. "https://console.example.com". Wildcards
            # are accepted (Spring CORS pattern semantics) but should be avoided
            # in prod.
            allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtMTIzNDU2Nzg=}
    issuer: device-platform

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.qaplatform: DEBUG
    org.springframework.cloud.gateway: INFO

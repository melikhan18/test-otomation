server:
  port: 8083
  forward-headers-strategy: framework

spring:
  application:
    name: session-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:device_platform}
    username: ${DB_USER:dp}
    password: ${DB_PASSWORD:dp_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: session
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    default-schema: session
    schemas: session
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtMTIzNDU2Nzg=}
    issuer: device-platform
  session:
    lock-ttl-minutes: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.devicefarm: DEBUG

server:
  port: 8084

spring:
  codec:
    max-in-memory-size: 10MB
  application:
    name: android-bridge-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  webflux:
    base-path: /

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtMTIzNDU2Nzg=}
    issuer: device-platform
  bridge:
    # how many frames to buffer per web subscriber before dropping non-keyframes
    web-buffer-size: 60
    # how often to ask the agent for a forced keyframe when a new web subscriber attaches
    force-keyframe-on-subscribe: true
    # heartbeat timeout — close channel if no agent heartbeat received in this many seconds
    heartbeat-timeout-seconds: 25

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      service: device-bridge

logging:
  level:
    com.qaplatform: DEBUG
    reactor.netty: INFO

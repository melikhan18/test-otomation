server:
  port: 8085
  forward-headers-strategy: framework

spring:
  application:
    name: android-automation-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:device_platform}
    username: ${DB_USER:dp}
    password: ${DB_PASSWORD:dp_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: android_automation
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    default-schema: android_automation
    schemas: android_automation
    locations: classpath:db/migration
  servlet:
    multipart:
      # APK upload'ları için yüksek tutuluyor. Büyük oyun APK'ları + Faz 4 sonrası AAB / split
      # APK ihtimaline karşı 500MB. Request limit dosya + form alanları için biraz daha geniş.
      max-file-size: 500MB
      max-request-size: 510MB

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtMTIzNDU2Nzg=}
    issuer: device-platform
  services:
    session:
      url: ${SVC_SESSION:http://localhost:8083}
    bridge:
      url:    ${SVC_BRIDGE:http://localhost:8084}
    reports:
      url:    ${SVC_REPORTS:http://localhost:8090}
  storage:
    # In-cluster URL the service uses to PUT/GET (Docker network DNS or localhost).
    endpoint:    ${MINIO_ENDPOINT:http://localhost:9000}
    # URL stamped onto returned object links so the browser can open them.
    public-url:  ${MINIO_PUBLIC_URL:http://localhost:9000}
    access-key:  ${MINIO_ACCESS_KEY:minioadmin}
    secret-key:  ${MINIO_SECRET_KEY:minioadmin123}
    region:      us-east-1
    screenshots-bucket: screenshots
    videos-bucket:      videos
    apks-bucket:        apks
  retention:
    enabled: ${RETENTION_ENABLED:true}
    days:    ${RETENTION_DAYS:30}
    # 6-field Spring cron — default 03:00 UTC daily.
    cron:    ${RETENTION_CRON:0 0 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.qaplatform: DEBUG

name: device-platform

# Full-stack compose: infrastructure + all backend services.
# For local development you can run only the infra and start each service in your IDE:
#   docker compose -f deploy/docker-compose/infrastructure.yml up -d
#
# The first `docker compose up --build` will pull a Gradle builder image and compile
# every backend module — that takes a few minutes. Subsequent runs reuse the layer cache.

x-service-env: &service-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: device_platform
  DB_USER: dp
  DB_PASSWORD: dp_dev_password
  REDIS_HOST: redis
  REDIS_PORT: 6379
  # Override JWT_SECRET in production. Must be base64 of at least 64 bytes.
  JWT_SECRET: Y2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtY2hhbmdlLW1lLWluLXByb2QtMTIzNDU2Nzg=
  # Object storage (MinIO). The endpoint is the in-network address services use to
  # PUT/GET objects; the public URL is what the browser actually opens (host port).
  MINIO_ENDPOINT:   http://minio:9000
  MINIO_PUBLIC_URL: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin123

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: device_platform
      POSTGRES_USER: dp
      POSTGRES_PASSWORD: dp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - dp_pgdata:/var/lib/postgresql/data
      - ./deploy/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp -d device_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API (objects are served from here for the browser)
      - "9001:9001"   # web console
    volumes:
      - dp_miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot init: creates the buckets we need with anonymous-download policy so the
  # web console can render screenshots / video without S3 presigning gymnastics.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb -p local/screenshots &&
      mc mb -p local/videos &&
      mc anonymous set download local/screenshots &&
      mc anonymous set download local/videos &&
      echo 'minio buckets ready'
      "
    restart: "no"

  auth-service:
    build:
      context: ./backend
      args:
        SERVICE: auth-service
    environment:
      <<: *service-env
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin@123
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "8081:8081"
    # Probes the actuator endpoint — only OK after Flyway finishes & Tomcat is
    # bound, which guarantees the tenancy tables (V3) exist before downstream
    # services try to backfill cross-schema in V2/V10.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  device-service:
    build:
      context: ./backend
      args:
        SERVICE: device-service
    environment:
      <<: *service-env
      # Spring relaxed-binding: APP_BRIDGE_PUBLIC_WS_URL → app.bridge.public-ws-url
      APP_BRIDGE_PUBLIC_WS_URL: ws://localhost:8080/ws/agent
    depends_on:
      postgres:     { condition: service_healthy }
      redis:        { condition: service_healthy }
      # device.V2 reads auth.companies for backfill — wait for V3 to finish.
      auth-service: { condition: service_healthy }
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  session-service:
    build:
      context: ./backend
      args:
        SERVICE: session-service
    environment:
      <<: *service-env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  device-bridge-service:
    build:
      context: ./backend
      args:
        SERVICE: device-bridge-service
    environment:
      <<: *service-env
    depends_on:
      redis: { condition: service_healthy }
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  automation-service:
    build:
      context: ./backend
      args:
        SERVICE: automation-service
    environment:
      <<: *service-env
      SVC_SESSION: http://session-service:8083
      SVC_BRIDGE:  http://device-bridge-service:8084
      # Retention policy — see RetentionService. Tweak per environment.
      RETENTION_ENABLED: "true"
      RETENTION_DAYS:    "30"
      RETENTION_CRON:    "0 0 3 * * *"
    depends_on:
      postgres: { condition: service_healthy }
      # automation.V10 reads auth.companies/projects for backfill — wait for V3.
      auth-service:          { condition: service_healthy }
      session-service:       { condition: service_started }
      device-bridge-service: { condition: service_started }
      minio:                 { condition: service_healthy }
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  api-gateway:
    build:
      context: ./backend
      args:
        SERVICE: api-gateway
    environment:
      <<: *service-env
      SVC_AUTH:       http://auth-service:8081
      SVC_DEVICE:     http://device-service:8082
      SVC_SESSION:    http://session-service:8083
      SVC_BRIDGE:     http://device-bridge-service:8084
      SVC_BRIDGE_WS:  ws://device-bridge-service:8084
      SVC_AUTOMATION: http://automation-service:8085
    depends_on:
      - auth-service
      - device-service
      - session-service
      - device-bridge-service
      - automation-service
    ports:
      - "8080:8080"

volumes:
  dp_pgdata:
  dp_miniodata:
